<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Portal</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Top Navigation Bar -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-xl font-bold">🛡️</div>
            <div>
                <h1 class="text-xl font-bold text-gray-900">CRM Portal</h1>
                <p class="text-xs text-gray-500">Customer Management System</p>
            </div>
        </div>
        <!-- Role Control Feature -->
        <div class="flex items-center gap-4">
            <span class="text-sm font-medium">Current Role:</span>
            <select id="roleSelector" class="bg-gray-100 border border-gray-300 rounded-lg px-3 py-1.5 text-sm font-semibold">
                <option value="Admin">Admin</option>
                <option value="Agent Alice">Agent Alice</option>
                <option value="Agent Bob">Agent Bob</option>
            </select>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto p-6">
        
        <!-- Metrics Section (Matches 111.PNG) -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                <div class="bg-blue-100 p-3 rounded-xl text-blue-600 text-xl">👤</div>
                <div>
                    <h3 class="text-2xl font-bold" id="totalCount">0</h3>
                    <p class="text-xs text-gray-500 font-medium">Total Records</p>
                </div>
            </div>
            <!-- More cards can be added here -->
        </div>

        <!-- Controls: Search and Add Record Button -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
            <input id="searchInput" type="text" placeholder="Search by name or status..." class="w-full sm:w-80 px-4 py-2 border border-gray-300 rounded-xl focus:outline-blue-500 bg-white">
            <button id="addRecordBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-xl transition shadow-sm">+ Add Record</button>
        </div>

        <!-- Data Table Layout -->
        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase">
                        <th class="p-4">Customer Name</th>
                        <th class="p-4">Assigned Agent</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-100 text-sm">
                    <!-- JavaScript will insert rows here dynamically -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Link to our Brain (JavaScript File) -->
    <script src="app.js"></script>
</body>
</html>
