<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- 🔐 LOGIN MODAL LAYER -->
    <div id="loginGate" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4" style="z-index: 9999;">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full shadow-2xl text-center">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">CRM Portal Login</h2>
            <p class="text-xs text-gray-500 mb-6">Select your profile and enter password</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-bold text-gray-600 block mb-1">User Profile</label>
                    <select id="loginRole" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-blue-500 font-medium">
                        <option value="Admin">System Administrator (Peter)</option>
                        <option value="Agent Alice">Agent Alice</option>
                        <option value="Agent Bob">Agent Bob</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-600 block mb-1">Password</label>
                    <input id="loginPassword" type="password" placeholder="••••••••" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-blue-500">
                    <p class="text-[11px] text-gray-400 mt-1">Hint: admin123 or agent123</p>
                </div>
                
                <button id="submitLoginBtn" type="button" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition mt-2">Verify & Enter</button>
                <p id="loginError" class="text-xs text-red-500 text-center hidden font-medium mt-2">❌ Invalid Password!</p>
            </div>
        </div>
    </div>

    <!-- 🖥️ MAIN APPLICATION INTERFACE -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-900">🛡️ CRM Portal</h1>
        <div class="flex items-center gap-2 bg-gray-100 px-4 py-2 rounded-xl">
            <span id="userBadge" class="text-sm font-bold text-gray-700">Not Logged In</span>
            <button id="logoutBtn" class="text-xs bg-gray-200 hover:bg-gray-300 px-2 py-1 rounded ml-2 text-gray-600">Logout</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h3 class="text-2xl font-bold" id="totalCount">0</h3>
                <p class="text-xs text-gray-500">Active Records View</p>
            </div>
        </div>

        <div class="flex justify-between items-center gap-4 mb-6">
            <input id="searchInput" type="text" placeholder="Search records..." class="w-80 px-4 py-2 border border-gray-300 rounded-xl bg-white">
            <button id="addRecordBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2 rounded-xl">+ Add Record</button>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase">
                        <th class="p-4">Customer Name</th>
                        <th class="p-4">Assigned Agent</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-200 text-sm"></tbody>
            </table>
        </div>
    </main>

    <!-- 💬 UPGRADED FLOATING CHAT WIDGET -->
    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end" style="position: fixed; bottom: 24px; right: 24px; z-index: 5000;">
        <div id="chatWindow" class="hidden bg-white rounded-2xl shadow-2xl border border-gray-300 flex flex-col overflow-hidden mb-4" style="display: none; width: 360px; height: 460px;">
            <div class="bg-blue-600 text-white p-4 flex justify-between items-center">
                <div>
                    <h4 class="font-bold text-sm">Office Internal Team Feed</h4>
                    <p class="text-[10px] text-blue-100">Supports text links & file transfers up to 10MB</p>
                </div>
                <button id="closeChatBtn" class="text-white text-sm font-bold">✕</button>
            </div>
            <!-- Chat Feed Screen -->
            <div id="chatMessages" class="flex-1 p-4 overflow-y-auto bg-gray-50 text-xs space-y-3" style="height: 320px; overflow-y: auto;"></div>
            
            <!-- Chat Input & File Tray Control Bar -->
            <div class="p-2 border-t border-gray-200 bg-white flex flex-col gap-1.5">
                <div class="flex gap-2 items-center">
                    <!-- 📎 Hidden File Input element triggered via button -->
                    <input id="chatFileInput" type="file" class="hidden" style="display: none;">
                    <button id="fileAttachBtn" type="button" class="bg-gray-100 hover:bg-gray-200 text-gray-600 p-2 rounded-xl text-lg font-bold" title="Upload File (Max 10MB)">📎</button>
                    
                    <input id="chatInput" type="text" placeholder="Type a message or paste links..." class="flex-1 px-3 py-2 border border-gray-300 rounded-xl text-sm focus:outline-blue-500">
                    <button id="sendChatBtn" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-700">Send</button>
                </div>
            </div>
        </div>
        <button id="toggleChatBtn" class="bg-blue-600 text-white p-4 rounded-full shadow-lg text-2xl" style="border-radius: 9999px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer;">💬</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
